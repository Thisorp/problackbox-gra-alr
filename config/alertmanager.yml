global:
  resolve_timeout: 1m

templates:
  - '/etc/alertmanager/telegram.tmpl'

route:
  receiver: 'telegram-notifications'
  group_by:
    - alertname
    - instance

  group_wait: 10s
  group_interval: 1m
  repeat_interval: 30m

receivers:

  - name: telegram-notifications
    telegram_configs:
      - bot_token: '8633751904:AAFaIA1RIe00MnblWaedvSeip44bxlFluws'
        chat_id: -5232704577
        parse_mode: 'HTML'
        message: '{{ template "telegram.message" . }}'
        send_resolved: true