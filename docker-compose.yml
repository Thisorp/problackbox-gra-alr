services:
  prometheus:
    image: prom/prometheus
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-lifecycle'
    volumes:
      - /data/monitoring/prometheus:/prometheus
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/rules.yml:/etc/prometheus/rules.yml:ro
      - ./config/targets:/etc/prometheus/targets:ro
    ports:
      - "9090:9090"

  alertmanager:
    image: prom/alertmanager
    restart: always
    ports:
      - "9093:9093"
    volumes:
      - /data/monitoring/alertmanager/:/alertmanager/
      - ./config/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    depends_on:
      - prometheus

  blackbox_exporter:
    image: prom/blackbox-exporter
    restart: always
    tty: true
    ports:
      - "9115:9115"
    dns: 8.8.8.8
    command: --config.file=/etc/blackbox/blackbox.yml
    volumes:
      - ./config/blackbox/:/etc/blackbox/
    cap_add:
      - NET_RAW
      - NET_ADMIN

  grafana:
    image: grafana/grafana-enterprise
    restart: always
    tty: true
    ports:
      - "3000:3000"
    volumes:
      - /data/monitoring/grafana:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning

