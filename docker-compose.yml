services:
  prometheus:
    image: prom/prometheus:v3
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=100GB'
      - '--storage.tsdb.wal-compression'
      - '--web.enable-lifecycle'
    volumes:
      - /data/monitoring/prometheus:/prometheus
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/rules.yml:/etc/prometheus/rules.yml:ro
      - ./config/targets:/etc/prometheus/targets:ro
    ports:
      - "9090:9090"

  alertmanager:
    image: prom/alertmanager:v0.31.1
    restart: always
    ports:
      - "9093:9093"
    volumes:
      - /data/monitoring/alertmanager/:/alertmanager/
      - ./config/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - ./config/alert/telegram.tmpl:/etc/alertmanager/telegram.tmpl
    env_file:
      - ./config/alert/.env
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    depends_on:
      - prometheus

  blackbox_exporter:
    image: prom/blackbox-exporter:v0.28.0
    restart: always
    tty: true
    ports:
      - "9115:9115"
    dns: 8.8.8.8
    command: --config.file=/etc/blackbox/blackbox.yml
    volumes:
      - ./config/blackbox/:/etc/blackbox/
    extra_hosts:
      - "gateway.vnpost.vn:172.16.254.73"
    cap_add:
      - NET_RAW
      - NET_ADMIN

  grafana:
    image: grafana/grafana-enterprise:13.0.0-22649226721-boringcrypto
    restart: always
    tty: true
    ports:
      - "3000:3000"
    volumes:
      - /data/monitoring/grafana:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning

